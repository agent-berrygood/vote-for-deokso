# Firebase Data Connect Voting System Schema

# 시스템 전체 설정 테이블
type SystemSetting @table(key: "id") {
  id: String!
  activeElection: Election!
}

# 선거 정보 테이블 (Election)
type Election @table(key: "id") {
  id: String!
  name: String
  maxVotes: Int!
  rounds: String # JSON format: {"장로": 2, "권사": 1, ...}
  roundTitle: String
  startDate: Timestamp
  endDate: Timestamp
}

# 후보자 정보 테이블 (Candidate)
type Candidate @table(key: "id") {
  id: String!
  election: Election!
  name: String!
  position: String!
  birthdate: String
  photoUrl: String
  round: Int!
  profileDesc: String
  volunteerInfo: String
  churchTitle: String
  district: String
  candidateNumber: Int
  voteCount: Int! @default(value: 0)
}

# 선거인 정보 테이블 (Voter)
type Voter @table(key: "id") {
  id: String!
  election: Election!
  name: String!
  authKey: String! # 인증용 고유 키 (인덱스 필요)
  phone: String
  birthdate: String
}

# 선거인 참여 기록
type VoterParticipation @table {
  voter: Voter!
  position: String!
  roundNumber: Int!
  votedAt: Timestamp! @default(expr: "request.time")
}

# 관리자 활동 로그 (시스템 설정 변경, 업로드 등)
type AdminLog @table {
  electionId: String!
  adminId: String
  actionType: String!
  description: String!
  timestamp: Timestamp! @default(expr: "request.time")
}

# 투표 감사 로그 (패스키 사용 등 민감 액션)
type AuditLog @table(key: "id") {
  id: String!
  electionId: String!
  voterId: String
  voterName: String
  actionType: String!
  approvedBy: String
  ipAddress: String
  timestamp: Timestamp! @default(expr: "request.time")
}
