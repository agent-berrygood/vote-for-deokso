# Firebase Data Connect Voting System Schema

type SystemSetting @table(key: "id") {
  id: String!
  activeElection: Election!
  activeService: String @default(value: "ELECTION") # "ELECTION" or "SURVEY"
  activeSurveyId: String
}

type Election @table(key: "id") {
  id: String!
  name: String
  maxVotes: Int!
  rounds: String
  roundTitle: String
  startDate: Timestamp
  endDate: Timestamp
}

type Candidate @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  election: Election!
  name: String!
  position: String!
  birthdate: String
  photoUrl: String
  round: Int!
  profileDesc: String
  volunteerInfo: String
  churchTitle: String
  district: String
  candidateNumber: Int
  voteCount: Int! @default(value: 0)
}

type Voter @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  election: Election!
  name: String!
  authKey: String! 
  phone: String
  birthdate: String
}

type VoterParticipation @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  voter: Voter!
  election: Election!
  position: String!
  roundNumber: Int!
  votedAt: Timestamp! @default(expr: "request.time")
}

type AdminLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  electionId: String!
  adminId: String
  actionType: String!
  description: String!
  timestamp: Timestamp! @default(expr: "request.time")
}

type AuditLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  electionId: String!
  voterId: String
  voterName: String
  actionType: String!
  approvedBy: String
  ipAddress: String
  timestamp: Timestamp! @default(expr: "request.time")
}

# --- NEW: 통합 교인 명부 및 설문조사 시스템 ---

type Member @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  phone: String
  birthdate: String
  originalId: String # 파이어스토어에서 이관된 원본 ID 추적용
  isSelfRegistered: Boolean @default(value: false)
}

type Survey @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  description: String
  startDate: Timestamp
  endDate: Timestamp
  isActive: Boolean @default(value: true)
}

type SurveySection @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  survey: Survey!
  title: String!
  description: String
  orderIdx: Int!
}

type SurveyQuestion @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  survey: Survey!
  section: SurveySection # Optional section
  text: String!
  type: String! # 예: "MULTIPLE_CHOICE", "TEXT", "MULTIPLE_SELECT"
  options: String # JSON string (객관식 보기)
  maxChoices: Int @default(value: 1)
  logic: String # JSON string for branching logic
  orderIdx: Int!
}

type SurveyResponse @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  survey: Survey!
  member: Member!
  answers: String! # JSON string (문항별 응답 내용)
  submittedAt: Timestamp! @default(expr: "request.time")
}
