# Firebase Data Connect Voting System Schema

type SystemSetting @table(key: "id") {
  id: String!
  activeElection: Election!
}

type Election @table(key: "id") {
  id: String!
  name: String
  maxVotes: Int!
  rounds: String
  roundTitle: String
  startDate: Timestamp
  endDate: Timestamp
}

type Candidate @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  election: Election!
  name: String!
  position: String!
  birthdate: String
  photoUrl: String
  round: Int!
  profileDesc: String
  volunteerInfo: String
  churchTitle: String
  district: String
  candidateNumber: Int
  voteCount: Int! @default(value: 0)
}

type Voter @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  election: Election!
  name: String!
  authKey: String! 
  phone: String
  birthdate: String
}

type VoterParticipation @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  voter: Voter!
  election: Election!
  position: String!
  roundNumber: Int!
  votedAt: Timestamp! @default(expr: "request.time")
}

type AdminLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  electionId: String!
  adminId: String
  actionType: String!
  description: String!
  timestamp: Timestamp! @default(expr: "request.time")
}

type AuditLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  electionId: String!
  voterId: String
  voterName: String
  actionType: String!
  approvedBy: String
  ipAddress: String
  timestamp: Timestamp! @default(expr: "request.time")
}
