# SurveyQuestion 관련 (업데이트됨)
query ListSurveyQuestions($surveyId: UUID!) @auth(level: PUBLIC) {
  surveyQuestions(where: {
    surveyId: { eq: $surveyId }
  }, orderBy: [{ orderIdx: ASC }]) {
    id
    sectionId
    text
    type
    options
    logic
    orderIdx
  }
}

mutation CreateSurveyQuestion($surveyId: UUID!, $sectionId: UUID, $text: String!, $type: String!, $options: String, $logic: String, $orderIdx: Int!) @auth(level: PUBLIC) {
