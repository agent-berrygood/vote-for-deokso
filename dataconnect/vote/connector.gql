mutation CreateElection($id: String!, $name: String, $maxVotes: Int!) @auth(level: PUBLIC) {
  election_insert(data: {
    id: $id,
    name: $name,
    maxVotes: $maxVotes
  })
}

query ListElections @auth(level: PUBLIC) {
  elections(orderBy: [{ id: DESC }]) {
    id
    name
    rounds
  }
}

mutation UpdateActiveElection($systemId: String!, $electionId: String!) @auth(level: PUBLIC) {
  systemSetting_update(id: $systemId, data: {
    activeElectionId: $electionId
  })
}

query GetResultsByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: NO_ACCESS) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  }, orderBy: [{ voteCount: DESC }, { name: ASC }]) {
    id
    name
    position
    voteCount
    candidateNumber
    birthdate
    photoUrl
    profileDesc
    volunteerInfo
    district
  }
}

query ListAdminLogs($electionId: String!) @auth(level: NO_ACCESS) {
  adminLogs(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ timestamp: DESC }]) {
    id
    electionId
    adminId
    actionType
    description
    timestamp
  }
}

query ListAuditLogs($electionId: String!) @auth(level: NO_ACCESS) {
  auditLogs(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ timestamp: DESC }]) {
    id
    voterId
    voterName
    actionType
    approvedBy
    ipAddress
    timestamp
  }
}

