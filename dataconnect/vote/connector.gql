    surveyId: $surveyId,
    sectionId: $sectionId,
    text: $text,
    type: $type,
    options: $options,
    logic: $logic,
    orderIdx: $orderIdx
  })
}

mutation UpdateSurveyQuestion($id: UUID!, $sectionId: UUID, $text: String, $type: String, $options: String, $logic: String, $orderIdx: Int) @auth(level: PUBLIC) {
  surveyQuestion_update(id: $id, data: {
    sectionId: $sectionId,
    text: $text,
    type: $type,
    options: $options,
    logic: $logic,
    orderIdx: $orderIdx
  })
}

mutation DeleteSurveyQuestion($id: UUID!) @auth(level: PUBLIC) {
