# dataconnect/vote/connector.gql

# 전역 시스템 설정 조회 (활성 선거 파악용)
query GetSystemSetting($id: String!) @auth(level: PUBLIC) {
  systemSetting(id: $id) {
    id
    activeElection {
      id
      name
    }
  }
}

# 선거인 정보 조회 (이름, 전화번호, 생년월일 기반)
query GetVoterByInfo($electionId: String!, $phone: String!, $birthdate: String!) @auth(level: PUBLIC) {
  voters(where: {
    electionId: { eq: $electionId },
    phone: { eq: $phone },
    birthdate: { eq: $birthdate }
  }) {
    id
    name
    phone
    birthdate
  }
}

# 선거 설정 정보 조회
query GetElectionSettings($electionId: String!) @auth(level: PUBLIC) {
  election(id: $electionId) {
    id
    name
    maxVotes
    rounds
    roundTitle
    startDate
    endDate
  }
}

# 특정 직분의 모든 차수 후보자 목록 조회
query ListCandidatesByPosition($electionId: String!, $position: String!) @auth(level: PUBLIC) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position }
  }, orderBy: [{ round: ASC }, { candidateNumber: ASC }, { name: ASC }]) {
    id
    name
    position
    birthdate
    photoUrl
    round
    district
    profileDesc
    volunteerInfo
    candidateNumber
    voteCount
  }
}

# 특정 직분 및 라운드의 후보자 목록 조회
query ListCandidatesByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: PUBLIC) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  }, orderBy: [{ candidateNumber: ASC }, { name: ASC }]) {
    id
    name
    position
    birthdate
    photoUrl
    round
    district
    profileDesc
    volunteerInfo
    candidateNumber
    voteCount
  }
}

# 투표 참여 기록 생성 (선거인, 직분, 차수 기반)
mutation SubmitVote($voterId: String!, $electionId: String!, $position: String!, $round: Int!) @auth(level: PUBLIC) {
  voterParticipation_upsert(data: {
    voterId: $voterId,
    position: $position,
    roundNumber: $round
  })
}

# 후보자 득표수 업데이트
mutation UpdateCandidateVote($candidateId: String!, $newCount: Int!) @auth(level: PUBLIC) {
  candidate_update(id: $candidateId, data: {
    voteCount: $newCount
  })
}

# 모든 선거인 목록 조회 (관리용)
query ListVoters($electionId: String!) @auth(level: PUBLIC) {
  voters(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ name: ASC }]) {
    id
    name
    phone
    birthdate
    authKey
  }
}

# 선거인 개별 추가
mutation CreateVoter($electionId: String!, $name: String!, $phone: String, $birthdate: String, $authKey: String!) @auth(level: PUBLIC) {
  voter_insert(data: {
    electionId: $electionId,
    name: $name,
    phone: $phone,
    birthdate: $birthdate,
    authKey: $authKey
  })
}

# 선거인 정보 수정
mutation UpdateVoter($id: String!, $name: String!, $phone: String, $birthdate: String) @auth(level: PUBLIC) {
  voter_update(id: $id, data: {
    name: $name,
    phone: $phone,
    birthdate: $birthdate
  })
}

# 선거인 개별 삭제
mutation DeleteVoter($id: String!) @auth(level: PUBLIC) {
  voter_delete(id: $id)
}

# 선거인 투표 참여 현황 통합 조회
query ListVoterParticipations($electionId: String!) @auth(level: PUBLIC) {
  voterParticipations(where: {
    voter: { electionId: { eq: $electionId } }
  }) {
    voterId
    position
    roundNumber
    votedAt
  }
}

# 후보자 개별 생성
mutation CreateCandidate($electionId: String!, $name: String!, $position: String!, $round: Int!, $district: String, $birthdate: String, $photoUrl: String, $profileDesc: String, $volunteerInfo: String, $candidateNumber: Int) @auth(level: PUBLIC) {
  candidate_insert(data: {
    electionId: $electionId,
    name: $name,
    position: $position,
    round: $round,
    district: $district,
    birthdate: $birthdate,
    photoUrl: $photoUrl,
    profileDesc: $profileDesc,
    volunteerInfo: $volunteerInfo,
    candidateNumber: $candidateNumber
  })
}

# 후보자 정보 수정
mutation UpdateCandidate($id: String!, $name: String!, $position: String, $round: Int, $district: String, $birthdate: String, $photoUrl: String, $profileDesc: String, $volunteerInfo: String, $candidateNumber: Int) @auth(level: PUBLIC) {
  candidate_update(id: $id, data: {
    name: $name,
    position: $position,
    round: $round,
    district: $district,
    birthdate: $birthdate,
    photoUrl: $photoUrl,
    profileDesc: $profileDesc,
    volunteerInfo: $volunteerInfo,
    candidateNumber: $candidateNumber
  })
}

# 후보자 삭제 (개별)
mutation DeleteCandidate($id: String!) @auth(level: PUBLIC) {
  candidate_delete(id: $id)
}

# 특정 차수의 후보자들만 일괄 삭제
mutation DeleteCandidatesByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: PUBLIC) {
  candidate_deleteMany(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  })
}

# 및 기타 선거 관리 뮤테이션들...
mutation UpdateElectionSettings($id: String!, $name: String, $maxVotes: Int!, $rounds: String, $roundTitle: String, $startDate: Timestamp, $endDate: Timestamp) @auth(level: PUBLIC) {
  election_update(id: $id, data: {
    name: $name,
    maxVotes: $maxVotes,
    rounds: $rounds,
    roundTitle: $roundTitle,
    startDate: $startDate,
    endDate: $endDate
  })
}

mutation CreateAdminLog($electionId: String!, $adminId: String, $actionType: String!, $description: String!) @auth(level: PUBLIC) {
  adminLog_insert(data: {
    electionId: $electionId,
    adminId: $adminId,
    actionType: $actionType,
    description: $description
  })
}

mutation CreateElection($id: String!, $name: String, $maxVotes: Int!) @auth(level: PUBLIC) {
  election_insert(data: {
    id: $id,
    name: $name,
    maxVotes: $maxVotes
  })
}

query ListElections @auth(level: PUBLIC) {
  elections(orderBy: [{ id: DESC }]) {
    id
    name
    rounds
  }
}

mutation UpdateActiveElection($systemId: String!, $electionId: String!) @auth(level: PUBLIC) {
  systemSetting_update(id: $systemId, data: {
    activeElectionId: $electionId
  })
}

query GetResultsByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: PUBLIC) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  }, orderBy: [{ voteCount: DESC }, { name: ASC }]) {
    id
    name
    position
    voteCount
    candidateNumber
    birthdate
    photoUrl
    profileDesc
    volunteerInfo
    district
  }
}

query ListAdminLogs($electionId: String!) @auth(level: PUBLIC) {
  adminLogs(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ timestamp: DESC }]) {
    id
    electionId
    adminId
    actionType
    description
    timestamp
  }
}

query ListAuditLogs($electionId: String!) @auth(level: PUBLIC) {
  auditLogs(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ timestamp: DESC }]) {
    id
    voterId
    voterName
    actionType
    approvedBy
    ipAddress
    timestamp
  }
}

mutation DeleteAllCandidates($electionId: String!) @auth(level: PUBLIC) {
  candidate_deleteMany(where: {
    electionId: { eq: $electionId }
  })
}

mutation DeleteAllVoters($electionId: String!) @auth(level: PUBLIC) {
  voter_deleteMany(where: {
    electionId: { eq: $electionId }
  })
}

# 모든 후보자 목록 조회
query ListAllCandidates($electionId: String!) @auth(level: PUBLIC) {
  candidates(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ position: ASC }, { candidateNumber: ASC }, { name: ASC }]) {
    id
    name
    position
    birthdate
    photoUrl
    round
    district
    profileDesc
    volunteerInfo
    candidateNumber
    voteCount
  }
}
