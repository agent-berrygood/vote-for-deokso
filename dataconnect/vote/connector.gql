query GetSystemSetting($id: String!) @auth(level: PUBLIC) {
  systemSetting(id: $id) {
    id
    activeElection {
      id
      name
    }
    activeService
    activeSurveyId
  }
}

query ListSurveys @auth(level: PUBLIC) {
  surveys(orderBy: [{ id: DESC }]) {
    id
    title
    description
    isActive
    startDate
    endDate
  }
}
query GetVoterByInfo($electionId: String!, $phone: String!, $birthdate: String!) @auth(level: NO_ACCESS) {
  voters(where: {
    electionId: { eq: $electionId },
    phone: { eq: $phone },
    birthdate: { eq: $birthdate }
  }) {
    id
    name
    phone
    birthdate
  }
}

query GetElectionSettings($electionId: String!) @auth(level: NO_ACCESS) {
  election(id: $electionId) {
    id
    name
    maxVotes
    rounds
    roundTitle
    startDate
    endDate
  }
}

query ListCandidatesByPosition($electionId: String!, $position: String!) @auth(level: NO_ACCESS) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position }
  }, orderBy: [{ round: ASC }, { candidateNumber: ASC }, { name: ASC }]) {
    id
    name
    position
    birthdate
    photoUrl
    round
    district
    profileDesc
    volunteerInfo
    candidateNumber
    voteCount
  }
}

query ListCandidatesByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: NO_ACCESS) {
  candidates(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  }, orderBy: [{ candidateNumber: ASC }, { name: ASC }]) {
    id
    name
    position
    birthdate
    photoUrl
    round
    district
    profileDesc
    volunteerInfo
    candidateNumber
    voteCount
  }
}

mutation SubmitVote($voterId: UUID!, $electionId: String!, $position: String!, $round: Int!) @auth(level: NO_ACCESS) {
  voterParticipation_insert(data: {
    voterId: $voterId,
    electionId: $electionId,
    position: $position,
    roundNumber: $round
  })
}

mutation UpdateCandidateVote($candidateId: UUID!, $newCount: Int!) @auth(level: NO_ACCESS) {
  candidate_update(id: $candidateId, data: {
    voteCount: $newCount
  })
}

query ListVoters($electionId: String!) @auth(level: NO_ACCESS) {
  voters(where: {
    electionId: { eq: $electionId }
  }, orderBy: [{ name: ASC }]) {
    id
    name
    phone
    birthdate
    authKey
  }
}

mutation CreateVoter($electionId: String!, $name: String!, $phone: String, $birthdate: String, $authKey: String!) @auth(level: NO_ACCESS) {
  voter_insert(data: {
    electionId: $electionId,
    name: $name,
    phone: $phone,
    birthdate: $birthdate,
    authKey: $authKey
  })
}

mutation UpdateVoter($id: UUID!, $name: String!, $phone: String, $birthdate: String) @auth(level: NO_ACCESS) {
  voter_update(id: $id, data: {
    name: $name,
    phone: $phone,
    birthdate: $birthdate
  })
}

mutation DeleteVoter($id: UUID!) @auth(level: NO_ACCESS) {
  voter_delete(id: $id)
}

query ListVoterParticipations($electionId: String!) @auth(level: NO_ACCESS) {
  voterParticipations(where: {
    voter: { electionId: { eq: $electionId } }
  }) {
    voterId
    position
    roundNumber
    votedAt
  }
}

mutation CreateCandidate($electionId: String!, $name: String!, $position: String!, $round: Int!, $district: String, $birthdate: String, $photoUrl: String, $profileDesc: String, $volunteerInfo: String, $candidateNumber: Int) @auth(level: NO_ACCESS) {
  candidate_insert(data: {
    electionId: $electionId,
    name: $name,
    position: $position,
    round: $round,
    district: $district,
    birthdate: $birthdate,
    photoUrl: $photoUrl,
    profileDesc: $profileDesc,
    volunteerInfo: $volunteerInfo,
    candidateNumber: $candidateNumber
  })
}

mutation UpdateCandidate($id: UUID!, $name: String!, $position: String, $round: Int, $district: String, $birthdate: String, $photoUrl: String, $profileDesc: String, $volunteerInfo: String, $candidateNumber: Int) @auth(level: NO_ACCESS) {
  candidate_update(id: $id, data: {
    name: $name,
    position: $position,
    round: $round,
    district: $district,
    birthdate: $birthdate,
    photoUrl: $photoUrl,
    profileDesc: $profileDesc,
    volunteerInfo: $volunteerInfo,
    candidateNumber: $candidateNumber
  })
}

mutation DeleteCandidate($id: UUID!) @auth(level: NO_ACCESS) {
  candidate_delete(id: $id)
}

mutation DeleteCandidatesByRound($electionId: String!, $position: String!, $round: Int!) @auth(level: NO_ACCESS) {
  candidate_deleteMany(where: {
    electionId: { eq: $electionId },
    position: { eq: $position },
    round: { eq: $round }
  })
}

mutation UpdateElectionSettings($id: String!, $name: String, $maxVotes: Int!, $rounds: String, $roundTitle: String, $startDate: Timestamp, $endDate: Timestamp) @auth(level: NO_ACCESS) {
  election_update(id: $id, data: {
    name: $name,
    maxVotes: $maxVotes,
    rounds: $rounds,
    roundTitle: $roundTitle,
    startDate: $startDate,
    endDate: $endDate
  })
}

mutation CreateAdminLog($electionId: String!, $adminId: String, $actionType: String!, $description: String!) @auth(level: NO_ACCESS) {
  adminLog_insert(data: {
